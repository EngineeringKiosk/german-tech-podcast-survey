version: "3.9"

services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "${PORT:-3001}:3001"
    environment:
      - PORT=${PORT:-3001}
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:3000}
      - DATA_DIR=/app/data
    volumes:
      - survey-data:/app/data
    restart: unless-stopped

volumes:
  survey-data:
